<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Prism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark">A</div>
          <div>
            <div class="title-row">
              <h1>Agent Prism</h1>
              <span class="live-pill">Live</span>
            </div>
            <p class="subtitle">
              Plug-and-play orchestration visibility across Copilot, Claude, and custom agents.
            </p>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="status-pill" id="status-pill-wrap">
            <span class="status-dot"></span>
            <span id="active-agents">No tenant connected</span>
          </div>
          <a href="/leadership.html" class="ghost topbar-link topbar-exec-link" style="color: #4ade80;">Executive View</a>
          <button id="save-api-key" class="ghost topbar-dev-only" style="display:none">Set API key</button>
          <button id="logout" class="ghost">Logout</button>
          <button id="reset-data" class="ghost topbar-dev-only" style="display:none">Reset tenant data</button>
          <button id="theme-toggle" class="ghost theme-toggle-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
            <span class="theme-icon-dark">☀️</span>
            <span class="theme-icon-light" style="display:none">🌙</span>
          </button>
        </div>
      </header>

      <main class="workspace" id="workspace">
        <div class="ap-splash">
          <div class="login-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
          </div>
          <div class="login-grid"></div>
          <div class="ap-splash-center">
            <div class="ap-splash-mark">AP</div>
            <div class="ap-splash-title">Agent Prism</div>
            <div class="ap-splash-sub">AI Governance Command Center</div>
            <div class="ap-splash-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
