version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: agent-control-plane-postgres
    environment:
      POSTGRES_DB: agent_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  postgres_data:
